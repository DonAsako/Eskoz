name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  quality:
    runs-on: ubuntu-latest
    env:
      DJANGO_SETTINGS_MODULE: eskoz.settings.development
      # Dummy secret so settings load in CI; never used to sign anything real.
      DJANGO_SECRET_KEY: ci-dummy-secret-key-not-for-production
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version-file: .python-version
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements/development.txt

      - name: Run pre-commit (ruff, yamllint, gitleaks, django checks)
        uses: pre-commit/action@v3.0.1
