{% extends 'base.html' %}
{% load i18n %}
{% block title %} - {% trans 'Protected' %}{% endblock %}
{% block robots %}<meta name="robots" content="noindex,follow">{% endblock %}
{% block content %}
<div class="article--form-password-wrapper">
    <div class="article--form-password">
        <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
        <h3>{% trans "This article is protected" %}</h3>
        <p>{% trans "Please enter the password to continue" %}</p>
        <form action="" method="POST">
            {% csrf_token %}
            <input type="password" name="password" placeholder="{% trans 'Password' %}" required>
            <button type="submit" class="btn">{% trans "Unlock" %}</button>
        </form>
    </div>
</div>
{% endblock %}
