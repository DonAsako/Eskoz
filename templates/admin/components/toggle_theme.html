{% load i18n %}
<button class="theme-toggle" type="button" onclick="toggleTheme()" aria-label="{% trans 'Toggle theme' %}" title="{% trans 'Toggle theme' %}">
    <span class="theme-toggle__indicator" aria-hidden="true"></span>
    <span class="theme-toggle__label" id="themeIconLight">light</span>
    <span class="theme-toggle__label" id="themeIconDark" style="display:none;">dark</span>
</button>
