{% load i18n %}
<nav class="topbar">
    <a class="topbar__brand" href="{% url 'admin:index' %}">
        <span class="topbar__brand-mark">◆</span>
        <span class="topbar__brand-text">{{ site_settings.site_name|default:"Eskoz" }}</span>
        <span class="topbar__brand-suffix">/ console</span>
    </a>

    {% if has_permission %}
    <div class="topbar__cluster">
        <a href="{% url 'core:index' %}" target="_blank" rel="noopener" class="topbar__link" title="{% translate 'Open public site in a new tab' %}">
            {% translate 'View site' %}
            <svg viewBox="0 0 12 12" width="10" height="10" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="1.5">
                <path d="M4 8 8 4M5 4h3v3"/>
            </svg>
        </a>

        <span class="topbar__divider" aria-hidden="true"></span>

        <a href="{% url 'admin:auth_user_change' user.pk %}" class="topbar__link topbar__link--user">
            <span class="topbar__avatar" aria-hidden="true">{{ user.username|first|upper }}</span>
            <span>{{ user.username }}</span>
        </a>

        <form class="topbar__logout" method="post" action="{% url 'admin:logout' %}">
            {% csrf_token %}
            <button type="submit" title="{% translate 'Sign out' %}">{% translate 'Sign out' %}</button>
        </form>

        {% include 'admin/components/toggle_theme.html' %}
    </div>
    {% endif %}
</nav>
