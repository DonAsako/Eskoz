{% extends 'admin/base.html' %}
{% load static i18n %}

{% block extrastyle %}
    {{ block.super }}
    <link rel="stylesheet" type="text/css" href="{% static 'admin/css/admin.css' %}">
{% endblock %}

{% block extrahead %}

{% endblock %}
